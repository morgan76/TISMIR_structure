seed: 0
device: auto
output_dir: outputs/train/rwc_pop_mert_baseline

model:
  name: projection_baseline
  audio:
    input_dim: null
    hidden_dim: 256
    output_dim: 128
  text:
    input_dim: null
    hidden_dim: 256
    output_dim: 128
  similarity:
    temperature: 0.07
    normalize: true

data:
  manifest: data/manifests/rwc_pop_10.local.jsonl
  audio_embedding_root: data/embeddings/audio
  audio_encoder: mert
  text_embedding_root: data/embeddings/text
  text_encoder: sentence_transformers
  audio_embedding_key: beat_sync
  namespace: segment_open
  candidate_label_strategy: dataset_labels
  ignore_index: -100

optimization:
  batch_size: 1
  max_epochs: 200
  learning_rate: 0.0001
  weight_decay: 0.00001
  shuffle: true

loss:
  name: frame_label_cross_entropy
  segment_balance: false
