seed: 0
device: auto
output_dir: outputs/train/harmonix_split_fact_self_attention_128d_4blocks_ce_pairwise_occurrence_prompt_random_annotations_regularized_fullval

model:
  name: temporal_text_adapter
  audio:
    input_dim: null
    hidden_dim: 128
    positional_encoding:
      type: sinusoidal
    num_layers: 2
  text:
    input_dim: null
    hidden_dim: 128
    num_layers: 1
  adapter:
    model_dim: 128
    num_heads: 8
    feedforward_dim: 512
    dropout: 0.2
  cross_attention:
    enabled: true
    bidirectional: true
    num_layers: 4
    num_heads: 8
  similarity:
    temperature: 0.07
    normalize: true

data:
  manifest: data/manifests/harmonix_train.local.jsonl
  audio_embedding_root: data/embeddings/audio
  audio_encoder: mert
  text_embedding_root: data/embeddings/text_occurrence_descriptive_random_annotations
  text_encoder: sentence_transformers
  audio_embedding_key: beat_sync
  namespace: segment_open
  candidate_label_strategy: track_labels
  annotation_processing:
    policy: random
    seed: 0
    validation_policy: enumerate_base_occurrences
    choices:
      - keep
      - merge
      - enumerate_all_occurrences
      - enumerate_base_occurrences
      - enumerate_consecutive_repeats
  ignore_index: -100

validation:
  manifest: data/manifests/harmonix_val.local.jsonl
  segmentation:
    enabled: true
    limit: null
    monitor: F-measure@3.0
    mode: max
    smoothing_window: 9
    smoothing_mode: mean
    decoder: viterbi
    transition_penalty: 1.5
    checkpoint_name: best_segmentation_checkpoint.pt

optimization:
  batch_size: 1
  progress: true
  max_epochs: 200
  learning_rate: 0.0001
  weight_decay: 0.001
  shuffle: true
  lr_scheduler:
    name: reduce_on_plateau
    patience: 2
    factor: 0.5
    min_lr: 0.000001
    threshold: 0.0
  early_stopping:
    patience: 20
    min_delta: 0.0

loss:
  name: frame_label_cross_entropy
  frame_label_weight: 1.0
  pairwise_probability:
    weight: 0.05
    balance: true
  similarity_matching:
    weight: 0.0
  text_uniformity:
    weight: 0.0
  audio_uniformity:
    weight: 0.0
  segment_balance: false
