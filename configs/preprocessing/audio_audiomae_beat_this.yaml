dataset_manifest: data/manifests/example.jsonl
output_root: data/embeddings/audio

audio_encoder:
  name: audiomae
  # timm-compatible AudioMAE weights on the HF Hub:
  model_name: hf_hub:gaunernst/vit_base_patch16_1024_128.audiomae_as2m
  device: cpu
  num_mel_bins: 128
  target_length: 1024
  patch_size: 16
  max_seconds: null

beat_tracker:
  name: beat_this
  checkpoint_path: final0
  device: cpu
  dbn: false
  float16: false

pooling:
  method: mean
  empty: nearest
  keep_dense: true
  final_interval: track_duration
