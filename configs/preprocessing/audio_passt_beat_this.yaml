dataset_manifest: data/manifests/example.jsonl
output_root: data/embeddings/audio

audio_encoder:
  name: passt
  variant: base  # base (10s) | base20sec | base30sec
  device: cpu
  embedding_dim: 1295  # HEAR timestamp-embedding size
  max_seconds: null

beat_tracker:
  name: beat_this
  checkpoint_path: final0
  device: cpu
  dbn: false
  float16: false

pooling:
  method: mean
  empty: nearest
  keep_dense: true
  final_interval: track_duration
