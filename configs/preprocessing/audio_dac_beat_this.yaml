dataset_manifest: data/manifests/example.jsonl
output_root: data/embeddings/audio

audio_encoder:
  name: dac
  checkpoint: descript/dac_44khz  # also: descript/dac_24khz, descript/dac_16khz
  device: cpu
  max_seconds: null

beat_tracker:
  name: beat_this
  checkpoint_path: final0
  device: cpu
  dbn: false
  float16: false

pooling:
  method: mean
  empty: nearest
  keep_dense: true
  final_interval: track_duration
