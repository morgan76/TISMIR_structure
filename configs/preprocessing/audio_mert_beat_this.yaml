dataset_manifest: data/manifests/example.jsonl
output_root: data/embeddings/audio

audio_encoder:
  name: mert
  checkpoint: m-a-p/MERT-v1-95M
  layer: -1
  device: cpu
  max_seconds: null
  trust_remote_code: true

beat_tracker:
  name: beat_this
  checkpoint_path: final0
  device: cpu
  dbn: false
  float16: false

pooling:
  method: mean
  empty: nearest
  keep_dense: true
  final_interval: track_duration
