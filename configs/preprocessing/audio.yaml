dataset_manifest: data/manifests/example.jsonl
output_root: data/embeddings/audio

audio_encoder:
  name: placeholder
  output_dim: 16
  frame_rate: 2.0

beat_tracker:
  name: uniform
  estimate_downbeats: true
  beat_period: 0.5

pooling:
  method: mean
  empty: nearest
  keep_dense: true
  final_interval: track_duration
