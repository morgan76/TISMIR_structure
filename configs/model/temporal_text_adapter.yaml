name: temporal_text_adapter

audio:
  input_dim: null
  hidden_dim: 256
  positional_encoding:
    type: sinusoidal
  num_layers: 2

text:
  input_dim: null
  hidden_dim: 256
  num_layers: 1

adapter:
  model_dim: 128
  num_heads: 4
  feedforward_dim: 512
  dropout: 0.1

cross_attention:
  enabled: false
  num_heads: null

similarity:
  temperature: 0.07
  normalize: true
